env: "local"

http_server:
  port: ":8080"
  read_timeout: 30s
  write_timeout: 30s

grpc_server:
  port: ":9090"

postgres:
  dsn: "postgres://user:password123@localhost:5437/dbname?sslmode=disable"
  max_retries: 10
  retry_interval: 5s
  connect_timeout: 30s

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  ttl: 5m
  max_retries: 10
  retry_interval: 5s
  connect_timeout: 30s
