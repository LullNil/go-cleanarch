stages:
  - test
  - build

variables:
  GO_VERSION: "1.25"
  TASK_VERSION: "v3.45.4"
  DOCKER_TLS_CERTDIR: ""

.setup_task_go:
  before_script:
    - go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}
    - export PATH="$(go env GOPATH)/bin:${PATH}"

.setup_task_alpine:
  before_script:
    - apk add --no-cache curl
    - curl -fsSL https://taskfile.dev/install.sh | sh -s -- -d -b /usr/local/bin ${TASK_VERSION}

go:
  image: golang:${GO_VERSION}
  stage: test
  extends: .setup_task_go
  script:
    - task ci

docker:
  image: docker:28
  stage: build
  extends: .setup_task_alpine
  services:
    - docker:28-dind
  script:
    - task docker:build IMAGE=go-cleanarch:ci
