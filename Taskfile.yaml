version: "3"

vars:
  GOLANGCI_LINT_VERSION: '{{.GOLANGCI_LINT_VERSION | default "latest"}}'

tasks:
  migrate:
    cmds:
      - task: migrate:up
    silent: true

  migrate:up:
    desc: "Apply all UP migrations for PostgreSQL"
    cmds:
      - go run ./cmd/migrator --database-dsn "postgres://user:password123@localhost:5437/dbname?sslmode=disable" --migrations-path ./migrations --command up

  migrate:down:
    desc: "Rollback the last DOWN migration for PostgreSQL"
    cmds:
      - go run ./cmd/migrator --database-dsn "postgres://user:password123@localhost:5437/dbname?sslmode=disable" --migrations-path ./migrations --command down

  server:
    desc: "Run the server"
    cmds:
      - go run ./cmd/app/main.go --config=./config/local.yaml

  proto:gen:
    desc: "Generate protobuf and gRPC Go bindings"
    cmds:
      - PATH="$HOME/go/bin:$PATH" protoc --go_out=. --go_opt=module=github.com/LullNil/go-cleanarch --go-grpc_out=. --go-grpc_opt=module=github.com/LullNil/go-cleanarch docs/proto/v1/entity1.proto

  fmt:
    desc: "Format Go files"
    cmds:
      - gofmt -w $(find . -name '*.go' -not -path './vendor/*')

  fmt:check:
    desc: "Check Go formatting"
    cmds:
      - test -z "$(gofmt -l .)"

  test:
    desc: "Run Go tests"
    cmds:
      - go test ./...

  tools:install:
    desc: "Install development tools"
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: "Run Go linters"
    preconditions:
      - sh: command -v golangci-lint
        msg: 'golangci-lint is not installed or not in PATH. Run: task tools:install and add $(go env GOPATH)/bin to PATH'
    cmds:
      - golangci-lint run ./...

  mod:tidy:
    desc: "Tidy Go module files"
    cmds:
      - go mod tidy

  mod:tidy:check:
    desc: "Check that go.mod and go.sum are tidy"
    cmds:
      - go mod tidy
      - git diff --exit-code -- go.mod go.sum

  docker:build:
    desc: "Build the application Docker image"
    cmds:
      - docker build -t {{.IMAGE | default "go-cleanarch:local"}} .

  ci:
    desc: "Run local CI checks"
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: mod:tidy:check
